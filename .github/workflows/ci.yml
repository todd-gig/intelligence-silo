name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.project.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: claude-decision-logic
            path: master-knowledge-base/claude-decision-logic
          - name: decision-execution-engine
            path: master-knowledge-base/decision-execution-engine
          - name: gigaton-engine
            path: gigaton-engine
          - name: sales-operating-system
            path: sales-operating-system

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.project.path }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ matrix.project.path }}
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint with ruff
        working-directory: ${{ matrix.project.path }}
        run: ruff check .

      - name: Run tests
        working-directory: ${{ matrix.project.path }}
        run: |
          if [ -f requirements-dev.txt ] || pip show pytest &>/dev/null; then
            python -m pytest --tb=short -q
          else
            echo "No test runner found — skipping tests for ${{ matrix.project.name }}"
          fi

  build-images:
    name: Build Docker Image (${{ matrix.project.name }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: claude-decision-logic
            path: master-knowledge-base/claude-decision-logic
            image: decision-logic
          - name: decision-execution-engine
            path: master-knowledge-base/decision-execution-engine
            image: decision-execution
          - name: gigaton-engine
            path: gigaton-engine
            image: gigaton-engine
          - name: sales-operating-system
            path: sales-operating-system
            image: sales-os

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.project.path }}
          push: false
          tags: ${{ matrix.project.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
