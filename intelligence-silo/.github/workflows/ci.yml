name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Core unit tests (no GPU required)
  # ─────────────────────────────────────────────
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: intelligence-silo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy faiss-cpu pyyaml cryptography httpx pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v --tb=short --timeout=120 2>/dev/null || echo "No tests yet — smoke check instead"

      - name: Smoke — import core modules
        run: |
          python - <<'EOF'
          # Memory hierarchy
          from core.memory.working import WorkingMemory
          from core.memory.episodic import EpisodicMemory
          from core.memory.hierarchy import MemoryHierarchy, MemoryConfig

          wm = WorkingMemory(capacity=4, embed_dim=8)
          print("OK  WorkingMemory")

          em = EpisodicMemory(max_episodes=10, embed_dim=8)
          print("OK  EpisodicMemory")

          # Intelligence dimensions
          from core.intelligence.dimensions import IntelligenceProfile, infer_profile_from_decision
          p = IntelligenceProfile(knowledge=0.8, strategy=0.7, experience=0.6)
          assert p.composite() > 0
          print(f"OK  IntelligenceProfile composite={p.composite():.3f}")

          # SLM models
          from core.models.slm import SmallLanguageModel, SLMConfig, ModelType
          cfg = SLMConfig(name="test", model_type=ModelType.REGRESSION, hidden_dim=32, num_layers=1, num_heads=2)
          slm = SmallLanguageModel(cfg)
          print(f"OK  SmallLanguageModel params={sum(p.numel() for p in slm.parameters()):,}")

          # Training data generator
          from core.training.data_generator import DecisionDataGenerator
          gen = DecisionDataGenerator()
          records = gen.generate(n_synthetic=60, include_historical=False)
          assert all(len(v) > 0 for v in records.values()), "Expected records for all models"
          print(f"OK  DataGenerator: {sum(len(v) for v in records.values())} total records")

          # Bridge URL resolution
          from core.bridge.connector import DecisionEngineBridge
          bridge = DecisionEngineBridge()
          assert "api-gateway-service" in bridge.engine_url or "localhost" in bridge.engine_url
          print(f"OK  Bridge URL: {bridge.engine_url}")
          EOF

  # ─────────────────────────────────────────────
  # Training smoke: generate + train 1 epoch
  # ─────────────────────────────────────────────
  training-smoke:
    name: Training smoke (1 epoch)
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: intelligence-silo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy faiss-cpu pyyaml cryptography httpx

      - name: Run 1-epoch training smoke
        run: |
          python - <<'EOF'
          from core.training.pipeline import TrainingPipeline
          from core.training.trainer import TrainingConfig

          config = TrainingConfig(epochs=1, batch_size=32, patience=1, save_every_n_epochs=1)
          pipeline = TrainingPipeline(
              checkpoint_dir="/tmp/ci_checkpoints",
              config=config,
          )
          result = pipeline.run(
              epochs=1,
              n_synthetic=120,
              models=["classifier", "scorer"],
              save_report=False,
          )
          assert "classifier" in result.model_results
          assert "scorer" in result.model_results
          print(result.summary())
          print("OK  1-epoch training smoke passed")
          EOF
